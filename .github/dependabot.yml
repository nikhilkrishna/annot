version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    pull-request-branch-name:
      separator: '-'
    groups:
      stable-updates:
        update-types:
          - "major"
          - "minor"
          - "patch"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    pull-request-branch-name:
      separator: '-'
    groups:
      stable-updates:
        update-types:
          - "major"
          - "minor"
          - "patch"

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    pull-request-branch-name:
      separator: '-'
    groups:
      stable-updates:
        update-types:
          - "major"
          - "minor"
          - "patch"
