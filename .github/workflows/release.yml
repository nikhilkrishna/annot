name: Build and Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (leave empty for latest)'
        required: false

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-26  # Apple Silicon runner (Tahoe)
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history to find tags

      - name: Determine tag
        id: get-tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(git describe --tags --abbrev=0)
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.get-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Install Node dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build

      - name: Package artifact
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          VERSION="${TAG#v}"
          cd src-tauri/target/release/bundle/macos
          mkdir annot
          cp -r annot.app annot/
          tar -czvf "annot-${VERSION}-darwin-arm64.tar.gz" annot
          mv "annot-${VERSION}-darwin-arm64.tar.gz" $GITHUB_WORKSPACE/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: annot-*-darwin-arm64.tar.gz
          tag_name: ${{ steps.get-tag.outputs.tag }}

  update-homebrew:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: denolehov
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Pin the version explicitly, otherwise Homebrew infers it from the
          # URL — and the darwin-arm64 asset (".../annot-x.y.z-darwin-arm64.tar.gz")
          # makes its heuristic extract "64" from "arm64", which then compares
          # greater than real versions and breaks `brew upgrade`.
          # homebrew-releaser substitutes this value as the git tag in the
          # source/asset URLs, so it must be the v-prefixed tag — it strips the
          # leading "v" itself for the formula's `version` line.
          version: ${{ needs.build-macos.outputs.tag }}
          install: |
            prefix.install "annot.app"
            bin.install_symlink prefix/"annot.app/Contents/MacOS/annot"
          test: 'system bin/"annot", "--version"'
          target_darwin_arm64: true
