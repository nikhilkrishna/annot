name: RC Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'RC version (e.g., 0.5.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-rc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "Error: Version must match X.Y.Z-rc.N format"
            exit 1
          fi

      - name: Create tag via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/$TAG" \
            -f sha="$SHA"
          echo "Created tag $TAG at $SHA"
